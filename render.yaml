services:
  - type: web
    name: aikaclaw
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: AIKACLAW_GATEWAY_PORT
        value: "8080"
      - key: AIKACLAW_STATE_DIR
        value: /data/.aikaclaw
      - key: AIKACLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: AIKACLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: aikaclaw-data
      mountPath: /data
      sizeGB: 1
